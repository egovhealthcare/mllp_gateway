name: Build Binaries

on:
  release:
    types: [released, prereleased]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            artifact: mllp-gateway-linux-amd64
          - os: macos-14
            artifact: mllp-gateway-darwin-arm64
          - os: windows-latest
            artifact: mllp-gateway-windows-amd64.exe

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Set version from release tag
        if: github.event_name == 'release'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml
          rm -f pyproject.toml.bak
          pip install -e .

      - name: Build binary
        run: pyinstaller mllp_gateway.spec --noconfirm

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv dist/mllp-gateway dist/${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: mv dist/mllp-gateway.exe dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Attach to Release
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -lR artifacts/

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          prerelease: ${{ github.event.release.prerelease }}
